<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Dominando los Verbos Irregulares!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .input-focus:focus {
            outline: none;
            border-color: #fda085;
            box-shadow: 0 0 0 4px rgba(253, 160, 133, 0.3);
        }
        .review-table th {
            background-color: #ffedd5;
            color: #9a3412;
        }
        .review-table td {
            border-bottom: 1px solid #fed7aa;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div id="app" class="w-full max-w-2xl card p-8 text-center">
        <!-- Pantalla de Inicio -->
        <div id="start-screen">
            <h1 class="text-4xl font-bold text-orange-600 mb-6">¡Aventura de Verbos! 🚀</h1>
            <p class="text-gray-700 text-xl mb-8">¿Estás listo para demostrar cuánto sabes de inglés? <br> Responde 10 preguntas y consigue las 10 para ganar.</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="showReview()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-xl transition-all transform hover:scale-105 shadow-lg">
                    📖 Repasar Verbos
                </button>
                <button onclick="startRound()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-10 rounded-full text-2xl transition-all transform hover:scale-105 shadow-lg">
                    ¡Empezar Ronda!
                </button>
            </div>
        </div>

        <!-- Pantalla de Repaso -->
        <div id="review-screen" class="hidden text-left">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-orange-600">Lista de Verbos</h2>
                <button onclick="showStart()" class="text-orange-500 font-bold hover:underline">← Volver</button>
            </div>
            
            <div class="overflow-y-auto max-h-[60vh] rounded-xl border border-orange-200">
                <table class="w-full review-table text-left border-collapse">
                    <thead class="sticky top-0">
                        <tr>
                            <th class="p-3 text-sm uppercase tracking-wider">Infinitive</th>
                            <th class="p-3 text-sm uppercase tracking-wider">Past Simple</th>
                            <th class="p-3 text-sm uppercase tracking-wider">Past Participle</th>
                        </tr>
                    </thead>
                    <tbody id="review-body" class="bg-white">
                        <!-- Se rellena con JS -->
                    </tbody>
                </table>
            </div>

            <button onclick="startRound()" class="w-full mt-6 bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-2xl text-xl transition-all">
                ¡Estoy listo, empezar!
            </button>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="question-counter" class="bg-orange-100 text-orange-700 font-bold py-2 px-4 rounded-full">Pregunta 1 de 10</span>
                <span id="score-live" class="text-gray-500 font-semibold"></span>
            </div>
            
            <div class="bg-orange-50 p-6 rounded-2xl mb-8">
                <h2 class="text-gray-600 uppercase tracking-widest text-sm font-bold mb-4">Completa el hueco:</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                    <div id="col-infinitive" class="text-2xl font-bold text-gray-800"></div>
                    <div id="col-past" class="text-2xl font-bold text-gray-800"></div>
                    <div id="col-participle" class="text-2xl font-bold text-gray-800"></div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3">
                <button id="prev-btn" onclick="prevQuestion()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-6 rounded-2xl text-xl transition-all invisible">
                    Volver
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="flex-[2] bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-2xl text-xl transition-all">
                    Siguiente
                </button>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="result-screen" class="hidden">
            <h2 id="result-title" class="text-4xl font-bold mb-4"></h2>
            <div id="result-message" class="text-xl mb-6"></div>
            
            <div class="text-left mb-8 overflow-y-auto max-h-96 pr-2">
                <h3 class="font-bold text-gray-700 mb-4 border-bottom border-gray-200">Resumen de tus respuestas:</h3>
                <ul id="results-list" class="space-y-3">
                    <!-- Las respuestas se insertan aquí -->
                </ul>
            </div>

            <div id="action-buttons">
                <!-- Se rellena dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const verbs = [
            { inf: "be", past: "was/were", part: "been" },
            { inf: "beat", past: "beat", part: "beaten" },
            { inf: "become", past: "became", part: "become" },
            { inf: "begin", past: "began", part: "begun" },
            { inf: "bend", past: "bent", part: "bent" },
            { inf: "bite", past: "bit", part: "bitten" },
            { inf: "break", past: "broke", part: "broken" },
            { inf: "bring", past: "brought", part: "brought" },
            { inf: "build", past: "built", part: "built" },
            { inf: "buy", past: "bought", part: "bought" },
            { inf: "catch", past: "caught", part: "caught" },
            { inf: "choose", past: "chose", part: "chosen" },
            { inf: "come", past: "came", part: "come" },
            { inf: "cut", past: "cut", part: "cut" },
            { inf: "do", past: "did", part: "done" }
        ];

        let currentRoundData = []; // Verbos seleccionados
        let currentIndex = 0;
        let score = 0;
        let userResponses = []; // Respuestas guardadas del usuario

        function showStart() {
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function showReview() {
            const body = document.getElementById('review-body');
            body.innerHTML = '';
            verbs.forEach(v => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-orange-50 transition-colors";
                tr.innerHTML = `<td class="p-3 font-bold text-gray-700">${v.inf}</td><td class="p-3 text-gray-600">${v.past}</td><td class="p-3 text-gray-600">${v.part}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.remove('hidden');
        }

        function startRound() {
            currentIndex = 0;
            score = 0;
            
            // Elegir 10 verbos aleatorios y preparar el estado de respuestas
            const shuffled = [...verbs].sort(() => 0.5 - Math.random());
            currentRoundData = shuffled.slice(0, 10).map(v => {
                const fields = ['inf', 'past', 'part'];
                const target = fields[Math.floor(Math.random() * 3)];
                return { ...v, target };
            });

            // Inicializar array de respuestas vacío
            userResponses = currentRoundData.map(v => ({
                verb: v.inf,
                fullVerb: v,
                target: v.target,
                userAnswer: "",
                correctAnswer: v[v.target]
            }));

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const current = userResponses[currentIndex];
            document.getElementById('question-counter').innerText = `Pregunta ${currentIndex + 1} de 10`;
            
            // Control de visibilidad del botón "Volver"
            const prevBtn = document.getElementById('prev-btn');
            if (currentIndex > 0) {
                prevBtn.classList.remove('invisible');
            } else {
                prevBtn.classList.add('invisible');
            }

            // Cambiar texto del botón "Siguiente" en la última pregunta
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = (currentIndex === 9) ? "Finalizar" : "Siguiente";

            const cols = {
                inf: document.getElementById('col-infinitive'),
                past: document.getElementById('col-past'),
                part: document.getElementById('col-participle')
            };

            Object.values(cols).forEach(col => col.innerHTML = '');

            Object.keys(cols).forEach(key => {
                const label = key === 'inf' ? 'Infinitive' : (key === 'past' ? 'Past Simple' : 'Past Participle');
                if (key === current.target) {
                    cols[key].innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-xs text-orange-400 mb-1">${label}</span>
                            <input type="text" id="user-input" autocomplete="off" class="w-full p-2 border-2 border-orange-200 rounded-xl text-center input-focus" placeholder="..." value="${current.userAnswer}">
                        </div>
                    `;
                } else {
                    cols[key].innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-400 mb-1">${label}</span>
                            <span>${current.fullVerb[key]}</span>
                        </div>
                    `;
                }
            });

            setTimeout(() => {
                const input = document.getElementById('user-input');
                if(input) {
                    input.focus();
                    // Seleccionar el texto si ya hay algo escrito para facilitar el borrado
                    input.select();
                    input.onkeypress = (e) => { if(e.key === 'Enter') nextQuestion(); };
                }
            }, 50);
        }

        function saveCurrentInput() {
            const input = document.getElementById('user-input');
            if (input) {
                userResponses[currentIndex].userAnswer = input.value.trim().toLowerCase();
            }
        }

        function nextQuestion() {
            saveCurrentInput();
            if (currentIndex < 9) {
                currentIndex++;
                showQuestion();
            } else {
                calculateResults();
            }
        }

        function prevQuestion() {
            saveCurrentInput();
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        function calculateResults() {
            score = 0;
            userResponses.forEach(res => {
                const correct = res.correctAnswer.toLowerCase();
                let isCorrect = false;
                if (correct.includes('/')) {
                    isCorrect = correct.split('/').includes(res.userAnswer);
                } else {
                    isCorrect = (res.userAnswer === correct);
                }
                res.isCorrect = isCorrect;
                if (isCorrect) score++;
            });
            showResults();
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const title = document.getElementById('result-title');
            const message = document.getElementById('result-message');
            const list = document.getElementById('results-list');
            const buttons = document.getElementById('action-buttons');

            list.innerHTML = '';
            
            const targetLabels = {
                inf: "infinitivo",
                past: "pasado simple",
                part: "participio pasado"
            };

            const sortedResponses = [...userResponses].sort((a, b) => b.isCorrect - a.isCorrect);

            sortedResponses.forEach(res => {
                const li = document.createElement('li');
                li.className = "p-3 rounded-xl border flex flex-col md:flex-row md:justify-between items-start md:items-center " + 
                              (res.isCorrect ? "bg-green-50 border-green-200" : "bg-red-50 border-red-200");
                
                const verbInfo = `<span class="font-bold text-gray-800">${res.fullVerb.inf} - ${res.fullVerb.past} - ${res.fullVerb.part}</span>`;
                
                if (res.isCorrect) {
                    li.innerHTML = `
                        <div class="flex items-center">
                            <span class="mr-2 text-green-600">✅</span>
                            ${verbInfo}
                        </div>
                        <span class="text-green-700 font-bold">¡Correcto!</span>
                    `;
                } else {
                    const label = targetLabels[res.target];
                    li.innerHTML = `
                        <div class="flex items-center">
                            <span class="mr-2 text-red-600">❌</span>
                            ${verbInfo}
                        </div>
                        <div class="mt-1 md:mt-0 text-sm">
                            <span class="italic font-bold text-gray-600">*${label}*:</span>
                            <span class="text-red-500 line-through mx-1">~${res.userAnswer || "(vacío)"}~</span>
                            <span class="text-gray-700 mr-1">Respuesta:</span>
                            <span class="text-green-600 font-bold underline">${res.correctAnswer}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });

            if (score >= 10) {
                title.innerText = "¡PERFECCIÓN TOTAL! 🎉";
                title.className = "text-4xl font-bold text-green-600 mb-4";
                message.innerHTML = `Has acertado <strong>${score} de 10</strong>. ¡Eres un maestro de los verbos!<br><br><span class="text-2xl text-orange-600 font-bold animate-bounce block">¡CORRE A ENSEÑÁRSELO A PAPÁ! 🏆</span>`;
                buttons.innerHTML = `
                    <button onclick="startRound()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition-all">
                        Jugar otra vez
                    </button>
                `;
            } else {
                title.innerText = "¡Casi lo tienes! 💪";
                title.className = "text-4xl font-bold text-orange-500 mb-4";
                message.innerHTML = `Has conseguido <strong>${score} de 10</strong>. <br>¡Necesitas un 10 perfecto para ganar! Sigue intentándolo.`;
                buttons.innerHTML = `
                    <button onclick="startRound()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-10 rounded-full text-xl transition-all shadow-lg">
                        ¡Intentar el 10 perfecto!
                    </button>
                `;
            }
        }
    </script>
</body>
</html>
