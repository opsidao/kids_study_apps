<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoAventura: El Guardián del Planeta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    body {
      font-family: 'Nunito', sans-serif;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .animate-bounce-slow {
      animation: bounce 3s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(-5%);
        animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
      }

      50% {
        transform: translateY(0);
        animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
      }
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div id="app"
    class="w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white relative">
    <!-- El contenido se genera mediante JavaScript -->
  </div>

  <script>
    const QUESTIONS_DATABASE = [
      { id: 1, question: "¿Qué es un ecosistema?", options: ["Un grupo de animales", "El conjunto de seres vivos, el medio físico y sus relaciones", "Un lugar donde solo hay plantas", "Un parque construido por el hombre"], correct: 1, icon: "fa-map-marked-alt", color: "text-indigo-500" },
      { id: 2, question: "¿Qué diferencia a un ecosistema natural de uno artificial?", options: ["El color", "La intervención humana", "La presencia de agua", "El tamaño"], correct: 1, icon: "fa-city", color: "text-gray-500" },
      { id: 3, question: "Los ecosistemas naturales se dividen principalmente en:", options: ["Grandes y pequeños", "Terrestres y acuáticos", "Calientes y fríos", "Con luz y sin luz"], correct: 1, icon: "fa-compass", color: "text-blue-500" },
      { id: 4, question: "¿Cómo se llama el conjunto de seres vivos de un ecosistema?", options: ["Biocenosis", "Biotipo", "Población", "Zoológico"], correct: 0, icon: "fa-leaf", color: "text-green-500" },
      { id: 5, question: "¿Qué es el medio físico o biotipo?", options: ["Los animales", "El lugar y sus condiciones (luz, suelo, agua...)", "Las plantas", "Las relaciones familiares"], correct: 1, icon: "fa-mountain", color: "text-stone-500" },
      { id: 6, question: "¿Cuáles son los factores principales en los ecosistemas terrestres?", options: ["La profundidad y el color", "La temperatura y la humedad", "La cantidad de peces", "La velocidad del viento"], correct: 1, icon: "fa-bolt", color: "text-yellow-500" },
      { id: 7, question: "En el desierto cálido, ¿qué ocurre con las temperaturas?", options: ["Son bajas siempre", "Altas de día y muy bajas de noche", "Constantes todo el año", "Siempre llueve"], correct: 1, icon: "fa-sun", color: "text-orange-500" },
      { id: 8, question: "¿Qué animales son comunes en el desierto cálido?", options: ["Osos y pingüinos", "Escorpiones, camellos y reptiles", "Monos y tucanes", "Elefantes y jirafas"], correct: 1, icon: "fa-sun", color: "text-orange-400" },
      { id: 9, question: "En el desierto frío, ¿en qué forma cae la precipitación?", options: ["Lluvia ácida", "Nieve", "Granizo gigante", "No hay precipitación"], correct: 1, icon: "fa-snowflake", color: "text-blue-200" },
      { id: 10, question: "¿Qué plantas se adaptan mejor al desierto cálido?", options: ["Musgos", "Cactus y palmeras", "Pinos", "Árboles de hoja caduca"], correct: 1, icon: "fa-sun", color: "text-yellow-600" },
      { id: 11, question: "¿Cómo es el clima en la Selva?", options: ["Frío y seco", "Altas temperaturas y mucha lluvia", "Templado y ventoso", "Extremo de día y noche"], correct: 1, icon: "fa-cloud-showers-heavy", color: "text-teal-600" },
      { id: 12, question: "¿En qué ecosistema hay árboles de hoja caduca que caen en otoño?", options: ["Selva", "Bosque templado", "Taiga", "Sabana"], correct: 1, icon: "fa-leaf", color: "text-orange-500" },
      { id: 13, question: "La Sabana se caracteriza por tener:", options: ["Bosques muy densos", "Temperaturas altas y hierbas altas con árboles dispersos", "Hielo perpetuo", "Cactus gigantes"], correct: 1, icon: "fa-sun", color: "text-amber-500" },
      { id: 14, question: "Los bosques de coníferas (pinos y abetos) son típicos de:", options: ["La Selva", "La Taiga", "El Desierto", "La Costa"], correct: 1, icon: "fa-tree", color: "text-emerald-800" },
      { id: 15, question: "¿Cuál es una característica de la Taiga?", options: ["Mucho calor", "Temperaturas bajas y mucha nieve", "Lluvia diaria", "Ausencia de árboles"], correct: 1, icon: "fa-snowflake", color: "text-blue-400" },
      { id: 16, question: "¿Qué animales son típicos de la Sabana?", options: ["Lince y lobo", "Elefante, jirafa y león", "Oso polar", "Camello"], correct: 1, icon: "fa-hippo", color: "text-yellow-700" },
      { id: 17, question: "¿Dónde encontramos una vegetación muy densa y siempre verde?", options: ["Bosque templado", "Selva", "Sabana", "Taiga"], correct: 1, icon: "fa-tree", color: "text-green-700" },
      { id: 18, question: "¿Qué define a los ecosistemas marinos?", options: ["Tienen baja salinidad", "Tienen alta salinidad", "No tienen vida", "Son solo artificiales"], correct: 1, icon: "fa-water", color: "text-blue-600" },
      { id: 19, question: "¿A qué profundidad llega la 'Zona Costera'?", options: ["Más de 1.000m", "Entre 0 y 200 metros", "Entre 200 y 1.000m", "Hasta el fondo"], correct: 1, icon: "fa-sun", color: "text-yellow-500" },
      { id: 20, question: "¿Por qué los productores se sitúan en la Zona Costera?", options: ["Porque el agua es más dulce", "Porque necesitan la luz del sol", "Porque hay menos peces", "Porque hace más calor"], correct: 1, icon: "fa-sun", color: "text-amber-400" },
      { id: 21, question: "La Zona Media del océano se encuentra entre:", options: ["0 y 200m", "200 y 1.000 metros", "1.000 y 5.000m", "Solo en la orilla"], correct: 1, icon: "fa-water", color: "text-blue-700" },
      { id: 22, question: "¿Qué ocurre con la fotosíntesis en la Zona Media (200-1000m)?", options: ["Es muy rápida", "Es imposible porque hay muy poca luz", "Solo ocurre de noche", "Las plantas crecen mucho"], correct: 1, icon: "fa-eye-slash", color: "text-indigo-800" },
      { id: 23, question: "¿Cómo se llama la zona más profunda del océano (más de 1.000m)?", options: ["Zona Costera", "Zona Abisal", "Zona Media", "Zona de Luz"], correct: 1, icon: "fa-fish", color: "text-slate-900" },
      { id: 24, question: "¿De qué se alimentan los peces de la Zona Abisal?", options: ["De algas", "De restos de seres vivos que caen al fondo", "De luz solar", "De frutos marinos"], correct: 1, icon: "fa-skull", color: "text-gray-400" },
      { id: 25, question: "¿En qué zona encontramos organismos movidos por el agua o nadando?", options: ["Solo en la abisal", "En la zona costera", "En el centro de la tierra", "Solo en acuarios"], correct: 1, icon: "fa-water", color: "text-cyan-400" },
      { id: 26, question: "¿Qué ecosistemas tienen baja salinidad?", options: ["Océanos", "Ríos, lagos y estanques", "Mares", "Sala de juegos"], correct: 1, icon: "fa-droplet", color: "text-cyan-600" },
      { id: 27, question: "¿Por qué hay muchas plantas y algas en ríos y lagos?", options: ["Porque no hay peces", "Porque reciben mucha luz al ser poco profundos", "Porque el agua es salada", "Porque el hombre las planta"], correct: 1, icon: "fa-sun", color: "text-yellow-400" },
      { id: 28, question: "Un ejemplo de ecosistema de agua dulce es:", options: ["El Océano Atlántico", "Un riachuelo", "El Mar Mediterráneo", "Una piscina con sal"], correct: 1, icon: "fa-tint", color: "text-blue-500" },
      { id: 29, question: "¿Quiénes fabrican su propio alimento con luz solar?", options: ["Consumidores", "Productores", "Descomponedores", "Humanos"], correct: 1, icon: "fa-leaf", color: "text-emerald-500" },
      { id: 30, question: "¿Cómo se llaman los animales herbívoros en la cadena?", options: ["Consumidores primarios", "Consumidores secundarios", "Productores", "Jefes"], correct: 0, icon: "fa-fish", color: "text-green-400" },
      { id: 31, question: "Los consumidores secundarios son animales:", options: ["Herbívoros", "Carnívoros (se alimentan de otros animales)", "Que comen rocas", "Que no comen"], correct: 1, icon: "fa-bolt", color: "text-red-500" },
      { id: 32, question: "Los hongos y bacterias suelen ser:", options: ["Productores", "Descomponedores", "Consumidores primarios", "Depredadores"], correct: 1, icon: "fa-microbe", color: "text-stone-500" },
      { id: 33, question: "¿Qué transforman los descomponedores?", options: ["Luz en comida", "Restos orgánicos en sustancias minerales", "Agua en vino", "Aire en fuego"], correct: 1, icon: "fa-recycle", color: "text-amber-700" },
      { id: 34, question: "Un león que come una gacela es un:", options: ["Productor", "Consumidor secundario", "Consumidor primario", "Descomponedor"], correct: 1, icon: "fa-paw", color: "text-orange-600" },
      { id: 35, question: "¿Qué es un ecosistema artificial?", options: ["Uno que tiene mucha lluvia", "Uno creado por la acción humana con un fin", "Uno donde no hay vida", "Uno que está bajo tierra"], correct: 1, icon: "fa-tools", color: "text-slate-600" },
      { id: 36, question: "Son ejemplos de ecosistemas artificiales:", options: ["Selva y Sabana", "Ciudades y campos de cultivo", "Océanos y Ríos", "Desiertos"], correct: 1, icon: "fa-building", color: "text-indigo-400" },
      { id: 37, question: "¿Cómo se llama el proceso de alimentarse unos de otros?", options: ["Fotosíntesis", "Cadena alimentaria", "Respiración", "Clasificación"], correct: 1, icon: "fa-link", color: "text-blue-500" },
      { id: 38, question: "¿Qué le ocurre a los árboles del bosque templado en invierno?", options: ["Se queman", "Muchos pierden sus hojas", "Crecen más rápido", "Se vuelven cactus"], correct: 1, icon: "fa-leaf", color: "text-orange-700" },
      { id: 39, question: "En el ecosistema, los seres vivos se relacionan entre sí y con:", options: ["El espacio exterior", "El medio físico", "Nada más", "Otros planetas"], correct: 1, icon: "fa-sync", color: "text-teal-400" },
      { id: 40, question: "La escasez de lluvias es propia de:", options: ["La Selva", "El Desierto cálido", "El Bosque templado", "Los Ríos"], correct: 1, icon: "fa-sun", color: "text-orange-300" }
    ];

    const QUESTIONS_PER_GAME = 15;
    const MAX_PLAYTIME = 30;

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isLocked = false;

    const appContainer = document.getElementById('app');

    function init() {
      renderStart();
    }

    function startGame() {
      currentQuestions = [...QUESTIONS_DATABASE]
        .sort(() => Math.random() - 0.5)
        .slice(0, QUESTIONS_PER_GAME);
      currentIndex = 0;
      score = 0;
      isLocked = false;
      renderQuiz();
    }

    function renderStart() {
      appContainer.innerHTML = `
                <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-6 text-white flex justify-between items-center shadow-md">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-leaf text-2xl bg-white/20 p-2 rounded-xl"></i>
                        <h1 class="text-2xl font-black italic tracking-tight">ECOAVENTURA</h1>
                    </div>
                </div>
                <div class="p-12 text-center space-y-8">
                    <div class="relative flex justify-center">
                        <div class="absolute inset-0 bg-indigo-200 blur-3xl opacity-40 animate-pulse rounded-full"></div>
                        <div class="relative w-32 h-32 bg-indigo-50 rounded-full flex items-center justify-center border-4 border-indigo-100 shadow-xl">
                            <i class="fas fa-compass text-6xl text-indigo-600 animate-bounce-slow"></i>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h2 class="text-4xl font-black text-slate-900 uppercase leading-tight">DESAFÍO DE 15 PREGUNTAS</h2>
                        <p class="text-slate-500 text-lg leading-relaxed px-4">
                            Consigue el <span class="font-bold text-indigo-600 underline">70% de aciertos</span> (11 preguntas) para ganar hasta <span class="font-bold text-indigo-600">${MAX_PLAYTIME} minutos</span> de juego.
                        </p>
                    </div>
                    <button onclick="startGame()" class="group flex items-center gap-4 mx-auto bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-6 rounded-3xl text-2xl font-black transition-all shadow-lg hover:scale-105 active:scale-95">
                        ¡COMENZAR!
                        <i class="fas fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                    </button>
                </div>
            `;
    }

    function renderQuiz() {
      const question = currentQuestions[currentIndex];
      const progress = ((currentIndex + 1) / QUESTIONS_PER_GAME) * 100;

      appContainer.innerHTML = `
                <div class="bg-gradient-to-r from-blue-500 to-emerald-500 p-6 text-white flex justify-between items-center transition-all duration-500">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-tree text-2xl bg-white/20 p-2 rounded-xl"></i>
                        <h1 class="text-2xl font-black italic">ECOAVENTURA</h1>
                    </div>
                    <div class="bg-black/20 px-5 py-2 rounded-2xl text-sm font-black border border-white/20">
                        ${currentIndex + 1} / ${QUESTIONS_PER_GAME}
                    </div>
                </div>
                <div class="p-8 md:p-12">
                    <div class="mb-10 text-center">
                        <div class="inline-flex p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 shadow-inner mb-6 transform hover:rotate-6 transition-transform">
                            <i class="fas ${question.icon} text-5xl ${question.color}"></i>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 leading-tight">
                            ${question.question}
                        </h2>
                    </div>

                    <div class="grid gap-4" id="options-container">
                        ${question.options.map((option, idx) => `
                            <button onclick="handleAnswer(${idx})" id="opt-${idx}" class="option-btn w-full p-5 text-left rounded-2xl border-4 border-slate-50 bg-slate-50 hover:border-indigo-400 hover:bg-indigo-50 hover:translate-x-2 transition-all text-lg font-bold flex justify-between items-center">
                                <span class="pr-4">${option}</span>
                                <span id="icon-${idx}"></span>
                            </button>
                        `).join('')}
                    </div>

                    <div class="mt-12 h-6 w-full bg-slate-100 rounded-full p-1.5 shadow-inner border border-slate-200">
                        <div class="h-full bg-indigo-500 rounded-full transition-all duration-700 shadow-sm" style="width: ${progress}%"></div>
                    </div>
                </div>
            `;
    }

    function handleAnswer(selectedIdx) {
      if (isLocked) return;
      isLocked = true;

      const question = currentQuestions[currentIndex];
      const correctIdx = question.correct;
      const isCorrect = selectedIdx === correctIdx;

      if (isCorrect) score++;

      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === correctIdx) {
          btn.classList.replace('border-slate-50', 'border-green-500');
          btn.classList.replace('bg-slate-50', 'bg-green-50');
          btn.classList.add('text-green-700');
          document.getElementById(`icon-${idx}`).innerHTML = '<i class="fas fa-check-circle text-2xl text-green-500"></i>';
        } else if (idx === selectedIdx && !isCorrect) {
          btn.classList.replace('border-slate-50', 'border-red-500');
          btn.classList.replace('bg-slate-50', 'bg-red-50');
          btn.classList.add('text-red-700');
          document.getElementById(`icon-${idx}`).innerHTML = '<i class="fas fa-times-circle text-2xl text-red-500"></i>';
        } else {
          btn.classList.add('opacity-30', 'scale-95');
        }
      });

      setTimeout(() => {
        if (currentIndex < QUESTIONS_PER_GAME - 1) {
          currentIndex++;
          isLocked = false;
          renderQuiz();
        } else {
          renderResult();
        }
      }, 1100);
    }

    function renderResult() {
      const percentage = Math.round((score / QUESTIONS_PER_GAME) * 100);
      const isWinner = percentage >= 70;

      const calculatedTime = score * 2;
      const playTime = isWinner ? Math.min(MAX_PLAYTIME, calculatedTime) : 0;

      appContainer.innerHTML = `
                <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-6 text-white flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-leaf text-2xl bg-white/20 p-2 rounded-xl"></i>
                        <h1 class="text-2xl font-black italic">ECOAVENTURA</h1>
                    </div>
                </div>
                <div class="p-12 text-center space-y-10 bg-slate-50/30">
                    <div class="relative">
                        <div class="p-8 rounded-full inline-block shadow-2xl border-8 ${isWinner ? 'bg-yellow-100 border-yellow-200' : 'bg-slate-100 border-slate-200'}">
                            <i class="fas ${isWinner ? 'fa-trophy text-yellow-500' : 'fa-redo text-slate-400'} text-7xl"></i>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <h2 class="text-4xl font-black text-slate-900">${isWinner ? "¡MISIÓN LOGRADA!" : "¡SIGUE ESTUDIANDO!"}</h2>
                        <div class="text-7xl font-black ${isWinner ? 'text-emerald-500' : 'text-slate-400'}">${percentage}%</div>
                        <p class="text-slate-500 font-bold text-lg">Has acertado ${score} de ${QUESTIONS_PER_GAME} preguntas.</p>
                    </div>

                    ${isWinner ? `
                        <div class="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl space-y-4 transform hover:scale-105 transition-transform">
                            <div class="flex justify-center gap-4 text-white/80 uppercase font-black tracking-widest text-sm">
                                <i class="fas fa-gamepad"></i>
                                PREMIO DESBLOQUEADO
                            </div>
                            <div class="text-6xl font-black flex items-center justify-center gap-4">
                                <i class="fas fa-clock text-indigo-300"></i>
                                ${playTime} MIN
                            </div>
                            <p class="text-indigo-200 font-bold italic">¡Has ganado tiempo de juego real!</p>
                        </div>
                    ` : `
                        <div class="bg-white border-4 border-red-50 p-8 rounded-[3rem] shadow-lg">
                            <p class="text-slate-600 font-bold leading-relaxed px-4">
                                Te has quedado cerca del <span class="text-red-500 font-black">70%</span> (11 aciertos). <br/>
                                Repasa el PDF y ¡vuelve a intentarlo para ganar el tiempo!
                            </p>
                        </div>
                    `}

                    <button onclick="startGame()" class="w-full bg-slate-900 hover:bg-black text-white p-7 rounded-3xl text-2xl font-black transition-all shadow-2xl flex items-center justify-center gap-4 active:scale-95">
                        <i class="fas fa-sync-alt"></i>
                        NUEVA RONDA
                    </button>
                </div>
            `;
    }

    init();
  </script>
</body>

</html>
