<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Estudiar">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <title>Directorio de Recursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Outfit:wght@400;600&display=swap');

        :root {
            --bg-start: #e6fffb;
            --bg-end: #f8fafc;
            --panel: rgba(255, 255, 255, 0.82);
            --border: rgba(15, 23, 42, 0.08);
            --title: #0f172a;
            --muted: #64748b;
            --accent: #0f766e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background:
                radial-gradient(70rem 32rem at -10% -20%, #ccfbf1 0%, transparent 60%),
                radial-gradient(70rem 32rem at 110% -10%, #bae6fd 0%, transparent 60%),
                linear-gradient(180deg, var(--bg-start), var(--bg-end));
            color: var(--title);
            min-height: 100dvh;
        }

        .app-shell {
            background: var(--panel);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 60px -30px rgba(15, 23, 42, 0.35);
            border-radius: 1.75rem;
            overflow: hidden;
        }

        .link-card {
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(255, 255, 255, 0.95);
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 25px -16px rgba(15, 23, 42, 0.45);
            border-color: #2dd4bf;
        }

        .link-card:active {
            transform: scale(0.985);
        }

        .app-title {
            font-family: 'Nunito', sans-serif;
            letter-spacing: -0.02em;
        }

        @media (max-width: 640px) {
            .app-shell {
                border-radius: 1.5rem;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4 sm:p-6"
    style="padding-top: max(1rem, env(safe-area-inset-top)); padding-bottom: max(1rem, env(safe-area-inset-bottom));">

    <div class="w-full max-w-md app-shell">
        <!-- Header -->
        <header class="text-center pt-8 px-5 sm:px-6">
            <div class="inline-block p-3 bg-teal-600 rounded-2xl shadow-lg shadow-teal-200/80 mb-4">
                <i data-lucide="layout-grid" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="app-title text-3xl font-extrabold tracking-tight">Recursos</h1>
            <p class="text-slate-500 mt-2">Toca un modulo para comenzar</p>
        </header>

        <!-- Container de enlaces -->
        <div id="lista-enlaces" class="space-y-3 px-4 py-6 sm:px-5">
            <!-- Los enlaces se cargarán aquí mediante JS -->
        </div>

        <footer class="px-5 pb-5 text-center text-xs text-slate-500">
            Funciona mejor al agregarla a tu pantalla de inicio.
        </footer>

    </div>

    <script>
        // 1. Datos enriquecidos con iconos y descripciones
        const paginas = [
            {
                nombre: "Ecosistemas",
                url: "apps/ecosistemas.html",
                desc: "Explora la biodiversidad y el medio ambiente",
                icon: "leaf",
                color: "text-emerald-500"
            },
            {
                nombre: "Relojes",
                url: "apps/relojes.html",
                desc: "Gestión del tiempo y cronometría",
                icon: "clock",
                color: "text-blue-500"
            },
            {
                nombre: "Verbos Irregulares",
                url: "apps/verbos_irregulares.html",
                desc: "Guía de gramática y conjugación",
                icon: "languages",
                color: "text-amber-500"
            },
            {
                nombre: "GeoMaster",
                url: "apps/geomaster.html",
                desc: "Aprende geometría de forma interactiva",
                icon: "square",
                color: "text-blue-600"
            }
        ];

        const contenedor = document.getElementById('lista-enlaces');

        // 2. Función para renderizar los enlaces
        function renderLinks() {
            contenedor.innerHTML = paginas.map(pagina => `
                <a href="${pagina.url}" class="link-card flex items-center p-4 bg-white border border-slate-100 rounded-2xl group">
                    <div class="flex-shrink-0 p-3 bg-slate-50 rounded-xl group-hover:bg-blue-50 transition-colors mr-4">
                        <i data-lucide="${pagina.icon}" class="w-6 h-6 ${pagina.color}"></i>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-semibold text-slate-800 group-hover:text-blue-600 transition-colors">
                            ${pagina.nombre}
                        </h3>
                        <p class="text-sm text-slate-400 line-clamp-1">
                            ${pagina.desc}
                        </p>
                    </div>
                    <div class="ml-2 text-slate-300 group-hover:text-blue-400 transition-colors">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </div>
                </a>
            `).join('');

            // Inicializar iconos después de renderizar el HTML
            lucide.createIcons();
        }

        // Ejecutar al cargar la página
        window.onload = renderLinks;
    </script>

</body>

</html>
