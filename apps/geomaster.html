<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoMaster - Aprendizaje Geométrico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .shape-container svg {
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

  <!-- Navegación -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/70 border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 cursor-pointer group" onclick="navigate('home')">
        <div class="bg-blue-600 p-1.5 rounded-lg group-hover:rotate-12 transition-transform text-white">
          <i data-lucide="square"></i>
        </div>
        <h1 class="font-bold text-xl tracking-tight">Geo<span class="text-blue-600">Master</span></h1>
      </div>
      <nav class="flex gap-2">
        <button onclick="navigate('study')" id="nav-study"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors hover:bg-slate-100">Estudiar</button>
        <button onclick="navigate('quiz')" id="nav-quiz"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors hover:bg-slate-100">Práctica</button>
      </nav>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main id="app-container" class="max-w-4xl mx-auto px-4 py-12">
    <!-- El contenido se inyecta mediante JavaScript -->
  </main>

  <footer id="footer-nav" class="max-w-4xl mx-auto px-4 py-8 border-t border-slate-200 text-center hidden">
    <button onclick="navigate('home')"
      class="text-slate-500 hover:text-blue-600 transition-colors flex items-center gap-1 mx-auto">
      <i data-lucide="chevron-left" class="w-4 h-4"></i> Volver al Inicio
    </button>
  </footer>

  <script>
    // --- Estado de la Aplicación ---
    let currentView = 'home';
    let quizState = {
      currentQuestion: 0,
      score: 0,
      answered: false,
      selectedOption: null
    };

    const QUIZ_QUESTIONS = [
      {
        question: "¿Qué tipo de líneas nunca se cruzan aunque se prolonguen?",
        options: ["Secantes", "Paralelas", "Perpendiculares", "Curvas"],
        answer: "Paralelas",
        explanation: "Las líneas paralelas mantienen la misma distancia entre sí en todo momento."
      },
      {
        question: "Observa la figura inferior. ¿Qué tipo de cuadrilátero es?",
        visual: '<svg viewBox="0 0 200 120" class="w-full max-w-[200px] h-32 mx-auto mb-4 text-amber-500"><path d="M50 20 L150 20 L180 100 L20 100 Z" fill="none" stroke="currentColor" stroke-width="4" /></svg>',
        options: ["Cuadrado", "Trapecio", "Rombo", "Rectángulo"],
        answer: "Trapecio",
        explanation: "Un trapecio es un cuadrilátero que tiene al menos un par de lados paralelos (en este caso, las bases)."
      },
      {
        question: "¿Cómo llamarías a este triángulo según sus lados?",
        visual: '<svg viewBox="0 0 200 160" class="w-full max-w-[200px] h-32 mx-auto mb-4 text-emerald-500"><polygon points="100,20 60,140 140,140" fill="none" stroke="currentColor" stroke-width="4" /></svg>',
        options: ["Equilátero", "Isósceles", "Escaleno", "Rectángulo"],
        answer: "Isósceles",
        explanation: "Este triángulo tiene dos lados de igual longitud y uno diferente."
      },
      {
        question: "En este plano, las líneas roja y azul representan calles...",
        visual: '<svg viewBox="0 0 200 120" class="w-full max-w-[200px] h-32 mx-auto mb-4"><line x1="20" y1="60" x2="180" y2="60" stroke="red" stroke-width="4" /><line x1="100" y1="10" x2="100" y2="110" stroke="blue" stroke-width="4" /><rect x="100" y="50" width="10" height="10" fill="none" stroke="gray" stroke-width="1" /></svg>',
        options: ["Paralelas", "Secantes no perpendiculares", "Perpendiculares", "Curvas"],
        answer: "Perpendiculares",
        explanation: "Las líneas se cortan formando un ángulo recto (90 grados)."
      },
      {
        question: "Calcula el área de este cuadrado si su lado mide 6 cm.",
        visual: '<svg viewBox="0 0 200 150" class="w-full max-w-[150px] h-32 mx-auto mb-4 text-blue-500"><rect x="40" y="20" width="120" height="110" fill="none" stroke="currentColor" stroke-width="4" /><text x="100" y="145" text-anchor="middle" fill="currentColor" font-weight="bold">6 cm</text></svg>',
        options: ["12 cm²", "24 cm²", "36 cm²", "18 cm²"],
        answer: "36 cm²",
        explanation: "El área del cuadrado es lado por lado: 6 x 6 = 36."
      },
      {
        question: "¿Qué figura tiene todos sus lados iguales pero NO tiene ángulos rectos?",
        options: ["Cuadrado", "Rectángulo", "Rombo", "Trapezoide"],
        answer: "Rombo",
        explanation: "El rombo tiene 4 lados iguales, pero sus ángulos suelen ser iguales dos a dos (agudos y obtusos)."
      },
      {
        question: "Si este triángulo es equilátero y su lado mide 5 m, ¿cuál es su perímetro?",
        visual: '<svg viewBox="0 0 200 160" class="w-full max-w-[200px] h-32 mx-auto mb-4 text-emerald-500"><polygon points="100,20 20,150 180,150" fill="none" stroke="currentColor" stroke-width="4" /><text x="100" y="145" text-anchor="middle" fill="currentColor" font-weight="bold" font-size="12">5 m</text></svg>',
        options: ["10 m", "15 m", "25 m", "20 m"],
        answer: "15 m",
        explanation: "El perímetro es la suma de sus tres lados iguales: 5 + 5 + 5 = 15 m."
      },
      {
        question: "Las líneas de este dibujo son...",
        visual: '<svg viewBox="0 0 200 120" class="w-full max-w-[200px] h-32 mx-auto mb-4 text-slate-400"><line x1="20" y1="30" x2="180" y2="90" stroke="currentColor" stroke-width="3" /><line x1="20" y1="100" x2="180" y2="20" stroke="currentColor" stroke-width="3" /></svg>',
        options: ["Paralelas", "Perpendiculares", "Secantes", "Inexistentes"],
        answer: "Secantes",
        explanation: "Son líneas que se cortan en un punto pero no forman ángulos de 90 grados."
      },
      {
        question: "Un triángulo con lados de 3cm, 4cm y 5cm es un triángulo...",
        options: ["Equilátero", "Isósceles", "Escaleno", "Cuadrado"],
        answer: "Escaleno",
        explanation: "Al tener todos los lados de diferente medida, se clasifica como escaleno."
      },
      {
        question: "¿Cuál de estos cuadriláteros tiene sus lados iguales dos a dos?",
        options: ["Cuadrado", "Rombo", "Rectángulo", "Trapecio Isósceles"],
        answer: "Rectángulo",
        explanation: "El rectángulo tiene los lados opuestos iguales (base y altura diferencian la figura)."
      }
    ];

    // --- Motores de Renderizado ---

    function navigate(view) {
      currentView = view;
      updateNavUI();
      render();
      window.scrollTo(0, 0);
    }

    function updateNavUI() {
      const studyBtn = document.getElementById('nav-study');
      const quizBtn = document.getElementById('nav-quiz');
      if (studyBtn && quizBtn) {
        studyBtn.className = `px-4 py-2 rounded-full text-sm font-medium transition-colors ${currentView === 'study' ? 'bg-blue-100 text-blue-600' : 'hover:bg-slate-100'}`;
        quizBtn.className = `px-4 py-2 rounded-full text-sm font-medium transition-colors ${currentView === 'quiz' ? 'bg-blue-100 text-blue-600' : 'hover:bg-slate-100'}`;
      }
      document.getElementById('footer-nav').classList.toggle('hidden', currentView === 'home');
    }

    function render() {
      const container = document.getElementById('app-container');
      container.innerHTML = '';

      if (currentView === 'home') renderHome(container);
      else if (currentView === 'study') renderStudy(container);
      else if (currentView === 'quiz') renderQuiz(container);

      lucide.createIcons();
    }

    function renderHome(container) {
      const history = getHistory();

      container.innerHTML = `
                <div class="text-center max-w-3xl mx-auto fade-in">
                    <h2 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-blue-600 to-emerald-600 bg-clip-text text-transparent leading-tight">
                        Domina la Geometría
                    </h2>
                    <p class="text-xl text-slate-600 mb-10 leading-relaxed">
                        Aprende sobre áreas, perímetros y tipos de polígonos con nuestra guía interactiva.
                    </p>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-12">
                        <button onclick="navigate('study')" class="group p-8 bg-white border border-slate-200 rounded-3xl shadow-xl shadow-slate-200/50 hover:border-blue-500 transition-all text-left">
                            <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center mb-4 text-blue-600 group-hover:scale-110 transition-transform">
                                <i data-lucide="book-open"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-2">Guía de Estudio</h3>
                            <p class="text-slate-500 text-sm">Visualiza figuras y memoriza las fórmulas clave.</p>
                        </button>
                        <button onclick="startQuiz()" class="group p-8 bg-white border border-slate-200 rounded-3xl shadow-xl shadow-slate-200/50 hover:border-emerald-500 transition-all text-left">
                            <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center mb-4 text-emerald-600 group-hover:scale-110 transition-transform">
                                <i data-lucide="gamepad-2"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-2">Ponerse a Prueba</h3>
                            <p class="text-slate-500 text-sm">Resuelve retos visuales y mejora tus resultados.</p>
                        </button>
                    </div>

                    <!-- Sección de Historial -->
                    <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm text-left">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="history" class="text-slate-400"></i> Tus Resultados
                            </h3>
                            ${history.length > 0 ? `<button onclick="clearHistory()" class="text-xs text-rose-500 hover:underline font-medium">Borrar historial</button>` : ''}
                        </div>

                        ${history.length === 0 ? `
                            <div class="py-8 text-center border-2 border-dashed border-slate-100 rounded-2xl">
                                <p class="text-slate-400 italic">No hay intentos registrados. ¡Es hora de empezar!</p>
                            </div>
                        ` : `
                            <div class="max-h-64 overflow-y-auto custom-scrollbar pr-2">
                                <div class="space-y-3">
                                    ${history.map(item => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div class="flex items-center gap-4">
                                                <div class="w-10 h-10 rounded-full ${item.percent >= 80 ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'} flex items-center justify-center font-bold">
                                                    ${item.percent}%
                                                </div>
                                                <div>
                                                    <p class="font-bold text-slate-800">${item.score} de ${item.total} aciertos</p>
                                                    <p class="text-xs text-slate-500">${item.date}</p>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
    }

    function renderStudy(container) {
      container.innerHTML = `
                <div class="space-y-12 fade-in">
                    <!-- Sección de Líneas -->
                    <section>
                        <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-blue-600">
                            <i data-lucide="hash"></i> Tipos de Líneas
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${renderLineCard('Paralelas', 'Nunca se cruzan.', '<line x1="20" y1="30" x2="180" y2="30" stroke="currentColor" stroke-width="4" /><line x1="20" y1="70" x2="180" y2="70" stroke="currentColor" stroke-width="4" />')}
                            ${renderLineCard('Perpendiculares', 'Forman un ángulo de 90°.', '<line x1="100" y1="10" x2="100" y2="90" stroke="currentColor" stroke-width="4" /><line x1="20" y1="50" x2="180" y2="50" stroke="currentColor" stroke-width="4" /><rect x="100" y="40" width="10" height="10" fill="none" stroke="red" stroke-width="2" />')}
                            ${renderLineCard('Secantes', 'Se cortan en un punto.', '<line x1="20" y1="20" x2="180" y2="80" stroke="currentColor" stroke-width="4" /><line x1="20" y1="80" x2="180" y2="20" stroke="currentColor" stroke-width="4" />')}
                        </div>
                    </section>

                    <!-- Sección de Triángulos -->
                    <section>
                        <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-emerald-600">
                            <i data-lucide="triangle"></i> Clasificación de Triángulos
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${renderTriangleCard('Equilátero', '3 lados iguales.', '100,10 20,150 180,150')}
                            ${renderTriangleCard('Isósceles', '2 lados iguales.', '100,10 50,150 150,150')}
                            ${renderTriangleCard('Escaleno', '0 lados iguales.', '60,10 20,150 180,120')}
                        </div>
                    </section>

                    <!-- Sección de Fórmulas REHECHA -->
                    <section>
                        <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-amber-600">
                            <i data-lucide="calculator"></i> Fórmulas de Área y Perímetro
                        </h3>
                        <div class="grid grid-cols-1 gap-4">
                            <!-- Cabecera de la tabla (Desktop) -->
                            <div class="hidden md:grid grid-cols-4 bg-amber-50 p-4 rounded-t-2xl border border-amber-100 font-bold text-amber-900">
                                <div>Figura</div>
                                <div>Partes clave</div>
                                <div>Área (Superficie)</div>
                                <div>Perímetro (Borde)</div>
                            </div>

                            <!-- Fila: Cuadrado -->
                            <div class="grid grid-cols-1 md:grid-cols-4 bg-white p-6 rounded-2xl md:rounded-none border border-slate-200 items-center gap-4">
                                <div class="flex items-center gap-3">
                                    <div class="bg-blue-100 p-2 rounded-lg text-blue-600"><i data-lucide="square" class="w-5 h-5"></i></div>
                                    <span class="font-bold">Cuadrado</span>
                                </div>
                                <div class="text-sm text-slate-500"><span class="font-medium text-slate-700">L</span> = Lado</div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-blue-700 font-semibold">Lado × Lado</span></div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-slate-700 font-semibold">Lado × 4</span></div>
                            </div>

                            <!-- Fila: Rectángulo -->
                            <div class="grid grid-cols-1 md:grid-cols-4 bg-white p-6 md:rounded-none border border-slate-200 items-center gap-4 border-t-0">
                                <div class="flex items-center gap-3">
                                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600"><i data-lucide="rectangle-horizontal" class="w-5 h-5"></i></div>
                                    <span class="font-bold">Rectángulo</span>
                                </div>
                                <div class="text-sm text-slate-500"><span class="font-medium text-slate-700">b</span> (base), <span class="font-medium text-slate-700">h</span> (altura)</div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-blue-700 font-semibold">Base × Altura</span></div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-slate-700 font-semibold">Suma de los 4 lados</span></div>
                            </div>

                            <!-- Fila: Triángulo -->
                            <div class="grid grid-cols-1 md:grid-cols-4 bg-white p-6 md:rounded-none border border-slate-200 items-center gap-4 border-t-0">
                                <div class="flex items-center gap-3">
                                    <div class="bg-emerald-100 p-2 rounded-lg text-emerald-600"><i data-lucide="triangle" class="w-5 h-5"></i></div>
                                    <span class="font-bold">Triángulo</span>
                                </div>
                                <div class="text-sm text-slate-500"><span class="font-medium text-slate-700">b</span> (base), <span class="font-medium text-slate-700">h</span> (altura)</div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-blue-700 font-semibold">(Base × Altura) ÷ 2</span></div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-slate-700 font-semibold">Suma de los 3 lados</span></div>
                            </div>

                            <!-- Fila: Rombo -->
                            <div class="grid grid-cols-1 md:grid-cols-4 bg-white p-6 md:rounded-none border border-slate-200 items-center gap-4 border-t-0">
                                <div class="flex items-center gap-3">
                                    <div class="bg-rose-100 p-2 rounded-lg text-rose-600"><i data-lucide="diamond" class="w-5 h-5"></i></div>
                                    <span class="font-bold">Rombo</span>
                                </div>
                                <div class="text-sm text-slate-500"><span class="font-medium text-slate-700">D</span> (mayor), <span class="font-medium text-slate-700">d</span> (menor)</div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-blue-700 font-semibold">(Diagonal × diagonal) ÷ 2</span></div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-slate-700 font-semibold">Lado × 4</span></div>
                            </div>

                            <!-- Fila: Trapecio -->
                            <div class="grid grid-cols-1 md:grid-cols-4 bg-white p-6 rounded-b-2xl border border-slate-200 items-center gap-4 border-t-0">
                                <div class="flex items-center gap-3">
                                    <div class="bg-amber-100 p-2 rounded-lg text-amber-600"><i data-lucide="trapezoid" class="w-5 h-5"></i></div>
                                    <span class="font-bold">Trapecio</span>
                                </div>
                                <div class="text-sm text-slate-500"><span class="font-medium text-slate-700">B</span> (grande), <span class="font-medium text-slate-700">b</span> (pequeña)</div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left text-xs"><span class="text-blue-700 font-semibold">[(Base+base) × altura] ÷ 2</span></div>
                                <div class="bg-slate-50 p-2 rounded-lg text-center md:text-left"><span class="text-slate-700 font-semibold">Suma de los 4 lados</span></div>
                            </div>
                        </div>
                    </section>
                </div>
            `;
    }

    function renderLineCard(title, desc, svgContent) {
      return `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 flex flex-col items-center shadow-sm">
                    <svg viewBox="0 0 200 100" class="w-full h-24 text-blue-500 mb-4">${svgContent}</svg>
                    <h4 class="font-bold text-lg text-slate-800">${title}</h4>
                    <p class="text-slate-500 text-sm">${desc}</p>
                </div>
            `;
    }

    function renderTriangleCard(title, desc, points) {
      return `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 flex flex-col items-center shadow-sm">
                    <svg viewBox="0 0 200 160" class="w-full h-24 text-emerald-500 mb-4">
                        <polygon points="${points}" fill="none" stroke="currentColor" stroke-width="4" />
                    </svg>
                    <h4 class="font-bold text-lg text-slate-800">${title}</h4>
                    <p class="text-slate-500 text-sm">${desc}</p>
                </div>
            `;
    }

    // --- Lógica de Almacenamiento ---

    function saveResult(score, total) {
      const history = getHistory();
      const newEntry = {
        date: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
        score: score,
        total: total,
        percent: Math.round((score / total) * 100)
      };
      history.unshift(newEntry);
      localStorage.setItem('geoMasterHistory', JSON.stringify(history.slice(0, 10)));
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem('geoMasterHistory') || '[]');
    }

    function clearHistory() {
      localStorage.removeItem('geoMasterHistory');
      render();
    }

    // --- Lógica del Quiz ---

    function startQuiz() {
      quizState = { currentQuestion: 0, score: 0, answered: false, selectedOption: null };
      navigate('quiz');
    }

    function handleQuizAnswer(index) {
      if (quizState.answered) return;
      const q = QUIZ_QUESTIONS[quizState.currentQuestion];
      quizState.selectedOption = q.options[index];
      quizState.answered = true;
      if (quizState.selectedOption === q.answer) quizState.score++;
      render();
    }

    function nextQuestion() {
      if (quizState.currentQuestion < QUIZ_QUESTIONS.length - 1) {
        quizState.currentQuestion++;
        quizState.answered = false;
        quizState.selectedOption = null;
        render();
      } else {
        saveResult(quizState.score, QUIZ_QUESTIONS.length);
        renderQuizResult();
      }
    }

    function renderQuiz(container) {
      const q = QUIZ_QUESTIONS[quizState.currentQuestion];
      const progress = ((quizState.currentQuestion + 1) / QUIZ_QUESTIONS.length) * 100;

      container.innerHTML = `
                <div class="max-w-2xl mx-auto fade-in">
                    <div class="mb-6 flex items-center justify-between">
                        <span class="text-sm font-bold uppercase tracking-wider text-slate-500">
                            Pregunta ${quizState.currentQuestion + 1} de ${QUIZ_QUESTIONS.length}
                        </span>
                        <div class="h-2 flex-1 mx-4 bg-slate-200 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl border border-slate-200 mb-8 shadow-sm">
                        ${q.visual ? `<div class="shape-container mb-6">${q.visual}</div>` : ''}
                        <h3 class="text-2xl font-bold text-slate-800 text-center">${q.question}</h3>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                        ${q.options.map((opt, i) => {
        let btnClass = "bg-white border-slate-200 hover:border-blue-400";
        let icon = "";
        if (quizState.answered) {
          if (opt === q.answer) {
            btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700 shadow-sm";
            icon = '<i data-lucide="check-circle-2" class="w-5 h-5"></i>';
          } else if (opt === quizState.selectedOption) {
            btnClass = "bg-rose-50 border-rose-500 text-rose-700 shadow-sm";
            icon = '<i data-lucide="x-circle" class="w-5 h-5"></i>';
          } else {
            btnClass = "bg-slate-50 opacity-50 border-slate-200";
          }
        }
        return `
                                <button onclick="handleQuizAnswer(${i})" ${quizState.answered ? 'disabled' : ''}
                                    class="p-5 rounded-2xl border-2 text-left transition-all font-semibold flex items-center justify-between ${btnClass}">
                                    ${opt} ${icon}
                                </button>
                            `;
      }).join('')}
                    </div>

                    ${quizState.answered ? `
                        <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 mb-8 fade-in">
                            <div class="flex gap-3">
                                <i data-lucide="info" class="w-6 h-6 text-blue-600 flex-shrink-0"></i>
                                <div>
                                    <p class="font-bold text-blue-900 mb-1">Dato útil:</p>
                                    <p class="text-blue-800">${q.explanation}</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="nextQuestion()" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-900 transition-colors shadow-lg">
                            ${quizState.currentQuestion === QUIZ_QUESTIONS.length - 1 ? 'Ver Resultado Final' : 'Siguiente Reto'}
                            <i data-lucide="chevron-right"></i>
                        </button>
                    ` : ''}
                </div>
            `;
    }

    function renderQuizResult() {
      const container = document.getElementById('app-container');
      const percent = (quizState.score / QUIZ_QUESTIONS.length) * 100;
      let message = "¡Sigue practicando!";
      let iconColor = "text-amber-500";
      if (percent >= 80) { message = "¡Eres un experto!"; iconColor = "text-emerald-500"; }
      else if (percent >= 50) { message = "¡Muy bien! Estás aprendiendo."; iconColor = "text-blue-500"; }

      container.innerHTML = `
                <div class="text-center py-12 fade-in max-w-md mx-auto">
                    <div class="relative inline-block mb-8">
                        <div class="w-40 h-40 rounded-full border-8 border-slate-100 flex items-center justify-center bg-white shadow-inner">
                            <span class="text-5xl font-black text-slate-800">${quizState.score}<span class="text-2xl text-slate-400">/${QUIZ_QUESTIONS.length}</span></span>
                        </div>
                        <div class="absolute -bottom-2 -right-2 bg-white text-emerald-500 p-3 rounded-full shadow-xl border border-slate-100">
                            <i data-lucide="award" class="w-8 h-8"></i>
                        </div>
                    </div>
                    <h3 class="text-3xl font-extrabold mb-3 text-slate-800">${message}</h3>
                    <p class="text-slate-500 mb-10 text-lg">Tu esfuerzo está dando frutos. Tus resultados han sido guardados.</p>

                    <div class="flex flex-col gap-3">
                        <button onclick="navigate('home')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                            <i data-lucide="home"></i> Ir al menú principal
                        </button>
                        <button onclick="startQuiz()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                            <i data-lucide="refresh-cw"></i> Intentarlo de nuevo
                        </button>
                    </div>
                </div>
            `;
      lucide.createIcons();
    }

    // Inicializar
    window.onload = () => {
      render();
    };

  </script>
</body>

</html>
