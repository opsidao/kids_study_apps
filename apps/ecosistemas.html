<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoAventura: El Guardián del Planeta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    body {
      font-family: 'Nunito', sans-serif;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .animate-bounce-slow {
      animation: bounce 3s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(-5%);
        animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
      }

      50% {
        transform: translateY(0);
        animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
      }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .timer-bar {
      transition: width 1s linear;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div id="app"
    class="w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white relative">
    <!-- El contenido se genera por JavaScript -->
  </div>

  <script>
    const QUESTIONS_DATABASE = [
      { id: 1, question: "¿Qué es un ecosistema?", options: ["Un grupo de animales de la misma especie", "El conjunto de seres vivos, el medio físico y sus relaciones", "Un lugar donde solo hay plantas y agua", "Un parque construido por el hombre para animales"], correct: 1, icon: "fa-map-marked-alt", color: "text-indigo-500" },
      { id: 2, question: "¿Qué diferencia a un ecosistema natural de uno artificial?", options: ["El color de la vegetación", "La intervención o creación por parte del ser humano", "La presencia de agua dulce o salada", "El tamaño de los animales que lo habitan"], correct: 1, icon: "fa-city", color: "text-gray-500" },
      { id: 3, question: "Los ecosistemas naturales se clasifican según el medio en:", options: ["Grandes y pequeños", "Terrestres y acuáticos", "Calientes y fríos", "Productores y consumidores"], correct: 1, icon: "fa-compass", color: "text-blue-500" },
      { id: 4, question: "¿Cómo se llama técnicamente al conjunto de seres vivos de un ecosistema?", options: ["Biocenosis", "Biotipo", "Población estática", "Comunidad artificial"], correct: 0, icon: "fa-leaf", color: "text-green-500" },
      { id: 5, question: "El 'Biotipo' se refiere a:", options: ["Los animales herbívoros", "El lugar físico y sus condiciones (luz, suelo, agua...)", "Las relaciones entre depredadores", "La suma de todas las plantas"], correct: 1, icon: "fa-mountain", color: "text-stone-500" },
      { id: 6, question: "En ecosistemas terrestres, ¿qué factores son los más determinantes?", options: ["La profundidad y la salinidad", "La temperatura y la humedad", "La velocidad del viento y la arena", "La altitud y el tipo de rocas"], correct: 1, icon: "fa-bolt", color: "text-yellow-500" },
      { id: 7, question: "¿Cuál es la característica térmica del desierto cálido?", options: ["Altas siempre", "Altas de día y muy bajas de noche", "Bajas todo el año", "Constantes (25ºC)"], correct: 1, icon: "fa-sun", color: "text-orange-500" },
      { id: 8, question: "Animales típicos del desierto cálido son:", options: ["Osos, lobos y zorros", "Escorpiones, camellos y serpientes", "Monos, tigres y tucanes", "Pingüinos y focas"], correct: 1, icon: "fa-sun", color: "text-orange-400" },
      { id: 9, question: "En el desierto frío, las escasas precipitaciones son en forma de:", options: ["Lluvia fina", "Nieve", "Granizo", "No hay ninguna forma de agua"], correct: 1, icon: "fa-snowflake", color: "text-blue-200" },
      { id: 10, question: "¿Qué plantas se adaptan mejor al desierto cálido?", options: ["Musgos y helechos", "Cactus y palmeras", "Pinos y abetos", "Árboles de hoja caduca"], correct: 1, icon: "fa-sun", color: "text-yellow-600" },
      { id: 11, question: "¿Qué clima define a la Selva?", options: ["Frío y seco con vientos", "Altas temperaturas y lluvias abundantes", "Templado con estaciones marcadas", "Extremo con heladas nocturnas"], correct: 1, icon: "fa-cloud-showers-heavy", color: "text-teal-600" },
      { id: 12, question: "¿Dónde encontramos árboles de hoja caduca que caen en otoño?", options: ["En la Selva", "En el Bosque templado", "En la Taiga", "En la Sabana"], correct: 1, icon: "fa-leaf", color: "text-orange-500" },
      { id: 13, question: "La Sabana se reconoce por:", options: ["Bosques impenetrables", "Temperaturas altas y hierbas altas con árboles dispersos", "Hielo perpetuo y falta de luz", "Lluvias diarias constantes"], correct: 1, icon: "fa-sun", color: "text-amber-500" },
      { id: 14, question: "Los bosques de coníferas (pinos y abetos) dominan en:", options: ["La Selva ecuatorial", "La Taiga", "El Desierto frío", "La Costa mediterránea"], correct: 1, icon: "fa-tree", color: "text-emerald-800" },
      { id: 15, question: "La Taiga se caracteriza por:", options: ["Calor extremo", "Temperaturas bajas y abundante nieve", "Lluvias tropicales", "Ausencia total de árboles"], correct: 1, icon: "fa-snowflake", color: "text-blue-400" },
      { id: 16, question: "Elefantes, jirafas y leones son propios de:", options: ["El Bosque templado", "La Sabana", "La Taiga", "La Selva"], correct: 1, icon: "fa-hippo", color: "text-yellow-700" },
      { id: 17, question: "¿Qué ecosistema tiene vegetación densa y siempre verde?", options: ["La Taiga", "La Selva", "El Desierto cálido", "El Bosque templado"], correct: 1, icon: "fa-tree", color: "text-green-700" },
      { id: 18, question: "Los ecosistemas marinos se distinguen por:", options: ["Baja salinidad", "Alta salinidad", "Agua estancada", "Falta de oxígeno"], correct: 1, icon: "fa-water", color: "text-blue-600" },
      { id: 19, question: "¿Qué profundidad abarca la 'Zona Costera'?", options: ["Más de 1.000m", "De 0 a 200 metros", "De 200 a 1.000m", "De 500 a 800m"], correct: 1, icon: "fa-sun", color: "text-yellow-500" },
      { id: 20, question: "¿Por qué los productores viven en la Zona Costera?", options: ["Por la baja presión", "Porque necesitan la luz solar para la fotosíntesis", "Porque no hay depredadores", "Porque el agua está más fría"], correct: 1, icon: "fa-sun", color: "text-amber-400" },
      { id: 21, question: "La Zona Media oceánica se sitúa entre:", options: ["0 y 200m", "200 y 1.000 metros", "1.000 y 4.000m", "Solo cerca de las islas"], correct: 1, icon: "fa-water", color: "text-blue-700" },
      { id: 22, question: "En la Zona Media (200-1000m):", options: ["Hay mucha luz y algas", "Hay muy poca luz y la fotosíntesis es imposible", "El agua es dulce", "Viven los camellos marinos"], correct: 1, icon: "fa-eye-slash", color: "text-indigo-800" },
      { id: 23, question: "La 'Zona Abisal' comienza a partir de:", options: ["Los 200m", "Los 1.000 metros de profundidad", "Los 500m", "El fondo de los ríos"], correct: 1, icon: "fa-fish", color: "text-slate-900" },
      { id: 24, question: "Los peces abisales se alimentan de:", options: ["Plancton de superficie", "Restos de seres vivos que caen al fondo", "Luz de volcanes", "Algas del fondo"], correct: 1, icon: "fa-skull", color: "text-gray-400" },
      { id: 25, question: "¿Dónde hay organismos movidos por el agua o nadadores?", options: ["Solo en la abisal", "En la zona costera (0-200m)", "En el centro del océano profundo", "Bajo la arena del desierto"], correct: 1, icon: "fa-water", color: "text-cyan-400" },
      { id: 26, question: "Ríos, lagos y estanques tienen:", options: ["Alta salinidad", "Baja salinidad", "Agua sin oxígeno", "Salinidad variable extrema"], correct: 1, icon: "fa-droplet", color: "text-cyan-600" },
      { id: 27, question: "¿Por qué hay tantas plantas en ríos y lagos?", options: ["Por la falta de corriente", "Porque reciben mucha luz al ser poco profundos", "Porque el agua es salada", "Porque los humanos las plantan"], correct: 1, icon: "fa-sun", color: "text-yellow-400" },
      { id: 28, question: "Es un ecosistema de agua dulce:", options: ["Océano Pacífico", "Un riachuelo", "Mar Cantábrico", "Mar Muerto"], correct: 1, icon: "fa-tint", color: "text-blue-500" },
      { id: 29, question: "Los seres vivos que fabrican su alimento son:", options: ["Consumidores", "Productores", "Descomponedores", "Biotipos"], correct: 1, icon: "fa-leaf", color: "text-emerald-500" },
      { id: 30, question: "Los consumidores primarios son:", options: ["Animales herbívoros", "Animales carnívoros", "Hongos y bacterias", "Plantas verdes"], correct: 0, icon: "fa-fish", color: "text-green-400" },
      { id: 31, question: "Los consumidores secundarios se definen como:", options: ["Herbívoros", "Carnívoros (se alimentan de otros animales)", "Fabricantes de oxígeno", "Animales que no comen"], correct: 1, icon: "fa-bolt", color: "text-red-500" },
      { id: 32, question: "Hongos y bacterias actúan como:", options: ["Productores", "Descomponedores", "Consumidores primarios", "Medio físico"], correct: 1, icon: "fa-microbe", color: "text-stone-500" },
      { id: 33, question: "Los descomponedores transforman restos orgánicos en:", options: ["Oxígeno puro", "Sustancias minerales", "Agua dulce", "Energía eléctrica"], correct: 1, icon: "fa-recycle", color: "text-amber-700" },
      { id: 34, question: "Una cadena alimentaria muestra:", options: ["Cómo crecen los árboles", "Las relaciones de alimentación en el ecosistema", "El mapa de un río", "La temperatura del suelo"], correct: 1, icon: "fa-link", color: "text-orange-600" },
      { id: 35, question: "Un ecosistema artificial es aquel:", options: ["Que no tiene agua", "Creado por la acción humana con un fin", "Donde no viven animales", "Que está bajo cúpulas"], correct: 1, icon: "fa-tools", color: "text-slate-600" },
      { id: 36, question: "Ejemplos claros de ecosistema artificial:", options: ["Selva y Ríos", "Ciudades y campos de cultivo", "Océanos y Taiga", "Sabana y Cuevas"], correct: 1, icon: "fa-building", color: "text-indigo-400" },
      { id: 37, question: "¿Qué ocurre en la Zona Media con la fotosíntesis?", options: ["Es muy activa", "Es imposible por falta de luz", "Solo ocurre a mediodía", "La hacen los peces"], correct: 1, icon: "fa-eye-slash", color: "text-blue-500" },
      { id: 38, question: "¿Qué vegetación es típica de la Taiga?", options: ["Cactus", "Coníferas (pinos y abetos)", "Árboles de hoja caduca", "Hierbas de 2 metros"], correct: 1, icon: "fa-tree", color: "text-orange-700" },
      { id: 39, question: "En el ecosistema, los seres vivos se relacionan con:", options: ["Otros planetas", "El medio físico y otros seres vivos", "Nada, viven aislados", "Solo con su familia"], correct: 1, icon: "fa-sync", color: "text-teal-400" },
      { id: 40, question: "Escasez de lluvias y pocas especies vegetales definen a:", options: ["La Selva", "El Desierto cálido", "La Sabana", "El Río"], correct: 1, icon: "fa-sun", color: "text-orange-300" }
    ];

    const QUESTIONS_PER_GAME = 15;
    const NORMAL_MAX_PLAYTIME = 15;
    const EXPERT_MAX_PLAYTIME = 30;
    const STORAGE_KEY = 'ecoaventura_stats_expert';
    const TIMER_SECONDS = 12;

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let isExpertMode = false;
    let isLocked = false;
    let timerInterval;
    let timeLeft = TIMER_SECONDS;

    const appContainer = document.getElementById('app');

    function init() {
      renderStart();
    }

    function saveResult(score, percentage, playTime, mode) {
      const stats = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const now = new Date();
      const record = {
        score,
        total: QUESTIONS_PER_GAME,
        percentage,
        playTime,
        mode: mode ? 'EXPERTO' : 'NORMAL',
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      };
      stats.unshift(record);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats.slice(0, 50)));
    }

    function getStats() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    // Función para barajar un array
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startGame(expert = false) {
      isExpertMode = expert;
      lives = 3;

      // 1. Seleccionar preguntas aleatorias
      const selectedRaw = [...QUESTIONS_DATABASE]
        .sort(() => Math.random() - 0.5)
        .slice(0, QUESTIONS_PER_GAME);

      // 2. Barajar las opciones de CADA pregunta seleccionada
      currentQuestions = selectedRaw.map(q => {
        const optionsWithMeta = q.options.map((text, index) => ({
          text,
          isCorrect: index === q.correct
        }));

        shuffleArray(optionsWithMeta);

        return {
          ...q,
          options: optionsWithMeta.map(o => o.text),
          correct: optionsWithMeta.findIndex(o => o.isCorrect)
        };
      });

      currentIndex = 0;
      score = 0;
      isLocked = false;
      renderQuiz();
    }

    function renderStart() {
      appContainer.innerHTML = `
                <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-6 text-white flex justify-between items-center shadow-md">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-leaf text-2xl bg-white/20 p-2 rounded-xl"></i>
                        <h1 class="text-2xl font-black italic tracking-tight uppercase">ECOAVENTURA</h1>
                    </div>
                </div>
                <div class="p-10 text-center space-y-8">
                    <div class="relative flex justify-center">
                        <div class="absolute inset-0 bg-indigo-200 blur-3xl opacity-40 animate-pulse rounded-full"></div>
                        <div class="relative w-32 h-32 bg-indigo-50 rounded-full flex items-center justify-center border-4 border-indigo-100 shadow-xl">
                            <i class="fas fa-globe-europe text-6xl text-indigo-600 animate-bounce-slow"></i>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h2 class="text-4xl font-black text-slate-900 uppercase leading-tight">Misión Ecosistemas</h2>
                        <p class="text-slate-500 text-lg leading-relaxed px-4">
                            Completa 15 preguntas correctamente (mínimo 11) para ganar tiempo de juego.
                        </p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <button onclick="startGame(false)" class="group flex flex-col items-center justify-center bg-emerald-500 hover:bg-emerald-600 text-white p-5 rounded-3xl transition-all shadow-lg hover:scale-105 active:scale-95">
                            <span class="text-xl font-black">MODO NORMAL</span>
                            <span class="text-sm opacity-90 font-bold italic">Recompensa máx: ${NORMAL_MAX_PLAYTIME} min</span>
                        </button>
                        <button onclick="startGame(true)" class="group flex flex-col items-center justify-center bg-slate-900 hover:bg-black text-white p-5 rounded-3xl transition-all shadow-lg hover:scale-105 active:scale-95 border-b-4 border-red-500">
                            <span class="text-xl font-black">MODO EXPERTO 🔥</span>
                            <span class="text-sm text-red-300 font-bold italic">Recompensa máx: ${EXPERT_MAX_PLAYTIME} min</span>
                        </button>
                        <button onclick="renderStats()" class="text-indigo-600 font-bold hover:underline py-2">
                            <i class="fas fa-chart-bar mr-2"></i>Ver Historial Completo
                        </button>
                    </div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Experto: 12 seg por pregunta • 3 vidas</p>
                </div>
            `;
    }

    function startTimer() {
      if (!isExpertMode) return;
      timeLeft = TIMER_SECONDS;
      updateTimerUI();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleAnswer(-1);
        }
      }, 1000);
    }

    function updateTimerUI() {
      const bar = document.getElementById('timer-bar');
      if (bar) {
        const perc = (timeLeft / TIMER_SECONDS) * 100;
        bar.style.width = perc + '%';
        if (timeLeft <= 3) bar.classList.replace('bg-indigo-500', 'bg-red-500');
        else bar.classList.replace('bg-red-500', 'bg-indigo-500');
      }
    }

    function renderQuiz() {
      const question = currentQuestions[currentIndex];
      const progress = ((currentIndex + 1) / QUESTIONS_PER_GAME) * 100;

      appContainer.innerHTML = `
                <div class="bg-gradient-to-r ${isExpertMode ? 'from-slate-800 to-red-900' : 'from-blue-500 to-emerald-500'} p-4 text-white flex justify-between items-center transition-all duration-500">
                    <div class="flex items-center gap-2">
                        <i class="fas ${isExpertMode ? 'fa-skull' : 'fa-tree'} text-lg"></i>
                        <h1 class="text-lg font-black italic uppercase">${isExpertMode ? 'MODO EXPERTO' : 'ECOAVENTURA'}</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        ${isExpertMode ? `<div class="flex gap-1 text-red-400">${Array(lives).fill('<i class="fas fa-heart"></i>').join('')}</div>` : ''}
                        <div class="bg-black/20 px-4 py-1 rounded-full text-xs font-black border border-white/20">
                            ${currentIndex + 1} / ${QUESTIONS_PER_GAME}
                        </div>
                    </div>
                </div>

                ${isExpertMode ? `<div class="h-2 w-full bg-slate-200"><div id="timer-bar" class="h-full bg-indigo-500 timer-bar" style="width: 100%"></div></div>` : ''}

                <div class="p-8 md:p-10">
                    <div class="mb-8 text-center">
                        <div class="inline-flex p-5 bg-slate-50 rounded-[2rem] border-2 border-slate-100 shadow-inner mb-4">
                            <i class="fas ${question.icon} text-4xl ${question.color}"></i>
                        </div>
                        <h2 class="text-xl md:text-2xl font-black text-slate-800 leading-tight min-h-[3rem]">
                            ${question.question}
                        </h2>
                    </div>

                    <div class="grid gap-3" id="options-container">
                        ${question.options.map((option, idx) => `
                            <button onclick="handleAnswer(${idx})" id="opt-${idx}" class="option-btn w-full p-4 text-left rounded-2xl border-4 border-slate-50 bg-slate-50 hover:border-indigo-400 hover:bg-indigo-50 hover:translate-x-1 transition-all text-lg font-bold flex justify-between items-center">
                                <span class="pr-4 leading-tight">${option}</span>
                                <span id="icon-${idx}"></span>
                            </button>
                        `).join('')}
                    </div>

                    <div class="mt-10 h-4 w-full bg-slate-100 rounded-full p-1 shadow-inner border border-slate-200">
                        <div class="h-full bg-indigo-400 rounded-full transition-all duration-700 shadow-sm" style="width: ${progress}%"></div>
                    </div>
                </div>
            `;
      startTimer();
    }

    function handleAnswer(selectedIdx) {
      if (isLocked) return;
      isLocked = true;
      clearInterval(timerInterval);

      const question = currentQuestions[currentIndex];
      const correctIdx = question.correct;
      const isCorrect = selectedIdx === correctIdx;

      if (isCorrect) {
        score++;
      } else {
        if (isExpertMode) lives--;
      }

      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === correctIdx) {
          btn.classList.replace('border-slate-50', 'border-green-500');
          btn.classList.replace('bg-slate-50', 'bg-green-50');
          btn.classList.add('text-green-700');
          const iconEl = document.getElementById(`icon-${idx}`);
          if (iconEl) iconEl.innerHTML = '<i class="fas fa-check-circle text-2xl text-green-500"></i>';
        } else if (idx === selectedIdx && !isCorrect) {
          btn.classList.replace('border-slate-50', 'border-red-500');
          btn.classList.replace('bg-slate-50', 'bg-red-50');
          btn.classList.add('text-red-700');
          const iconEl = document.getElementById(`icon-${idx}`);
          if (iconEl) iconEl.innerHTML = '<i class="fas fa-times-circle text-2xl text-red-500"></i>';
        } else {
          btn.classList.add('opacity-30', 'scale-95');
        }
      });

      setTimeout(() => {
        if (isExpertMode && lives <= 0) {
          renderResult(true);
        } else if (currentIndex < QUESTIONS_PER_GAME - 1) {
          currentIndex++;
          isLocked = false;
          renderQuiz();
        } else {
          renderResult(false);
        }
      }, 1200);
    }

    function renderResult(isGameOver) {
      clearInterval(timerInterval);
      const percentage = Math.round((score / QUESTIONS_PER_GAME) * 100);
      const isWinner = percentage >= 70 && !isGameOver;

      const calculatedTime = isExpertMode ? score * 2 : score * 1;
      const playTime = isWinner ? Math.floor(calculatedTime) : 0;

      saveResult(score, percentage, playTime, isExpertMode);

      appContainer.innerHTML = `
                <div class="${isExpertMode ? 'bg-slate-900' : 'bg-indigo-600'} p-6 text-white flex justify-between items-center shadow-lg">
                    <div class="flex items-center gap-3">
                        <i class="fas ${isWinner ? 'fa-trophy' : 'fa-flag-checkered'} text-2xl text-yellow-400"></i>
                        <h1 class="text-2xl font-black italic uppercase tracking-tight">RESULTADOS</h1>
                    </div>
                </div>
                <div class="p-10 text-center space-y-8 bg-slate-50/30">
                    <div class="relative">
                        <div class="p-8 rounded-full inline-block shadow-2xl border-8 ${isWinner ? 'bg-yellow-100 border-yellow-200' : 'bg-slate-100 border-slate-200'}">
                            <i class="fas ${isWinner ? 'fa-star text-yellow-500' : (isGameOver ? 'fa-skull-crossbones text-red-500' : 'fa-redo text-slate-400')} text-7xl"></i>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <h2 class="text-3xl font-black text-slate-900 leading-none">
                            ${isGameOver ? "¡GAME OVER!" : (isWinner ? "¡MISIÓN LOGRADA!" : "¡VUELVE A INTENTARLO!")}
                        </h2>
                        <div class="text-7xl font-black ${isWinner ? 'text-emerald-500' : (isGameOver ? 'text-red-500' : 'text-slate-400')}">${percentage}%</div>
                        <p class="text-slate-500 font-bold text-lg">Has acertado ${score} de ${QUESTIONS_PER_GAME} preguntas.</p>
                        <p class="text-xs font-black uppercase text-slate-400 tracking-widest mt-2">Dificultad: ${isExpertMode ? 'Experto 🔥' : 'Normal'}</p>
                    </div>

                    ${isWinner ? `
                        <div class="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl space-y-4 transform hover:scale-105 transition-transform border-b-8 border-indigo-800">
                            <div class="flex justify-center gap-4 text-white/80 uppercase font-black tracking-widest text-sm">
                                <i class="fas fa-gamepad"></i> RECOMPENSA OBTENIDA
                            </div>
                            <div class="text-6xl font-black flex items-center justify-center gap-4">
                                <i class="fas fa-clock text-indigo-300"></i> ${playTime} MIN
                            </div>
                        </div>
                    ` : `
                        <div class="bg-white border-4 border-red-50 p-8 rounded-[3rem] shadow-lg">
                            <p class="text-slate-600 font-bold leading-relaxed px-4">
                                ${isGameOver ? "Has perdido todas las vidas. ¡El modo experto requiere concentración máxima!" : "Necesitas al menos 11 aciertos para ganar tiempo de juego."}
                            </p>
                        </div>
                    `}

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="renderStart()" class="bg-slate-900 hover:bg-black text-white p-5 rounded-2xl text-lg font-black transition-all shadow-xl active:scale-95">
                            <i class="fas fa-home mr-2"></i>Inicio
                        </button>
                        <button onclick="renderStats()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 p-5 rounded-2xl text-lg font-black transition-all active:scale-95">
                            <i class="fas fa-chart-bar mr-2"></i>Historial
                        </button>
                    </div>
                </div>
            `;
    }

    function renderStats() {
      const stats = getStats();
      appContainer.innerHTML = `
                <div class="bg-slate-800 p-6 text-white flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-chart-bar text-2xl text-indigo-400"></i>
                        <h1 class="text-2xl font-black italic uppercase tracking-tight">Estadísticas</h1>
                    </div>
                    <button onclick="renderStart()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                        <i class="fas fa-home mr-1"></i> Inicio
                    </button>
                </div>
                <div class="p-8">
                    <div class="max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                        ${stats.length === 0 ? `
                            <div class="text-center py-12 text-slate-400">
                                <i class="fas fa-history text-4xl mb-4 opacity-20"></i>
                                <p class="text-xl italic italic">Todavía no hay registros de misiones.</p>
                            </div>
                        ` : `
                            <div class="space-y-3">
                                ${stats.map((s, idx) => `
                                    <div class="bg-slate-50 border-2 ${s.percentage >= 70 ? 'border-emerald-100' : 'border-slate-200'} p-4 rounded-2xl flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${s.date} • ${s.time} • MODO: ${s.mode || 'NORMAL'}</span>
                                            <span class="text-xl font-black ${s.percentage >= 70 ? 'text-emerald-600' : 'text-slate-600'}">
                                                ${s.score}/${s.total} (${s.percentage}%)
                                            </span>
                                        </div>
                                        <div class="text-right">
                                            ${s.percentage >= 70 ? `
                                                <div class="bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full mb-1">ÉXITO</div>
                                                <div class="text-sm font-bold text-slate-500">+${s.playTime} min</div>
                                            ` : `
                                                <div class="bg-slate-300 text-white text-[10px] font-black px-2 py-0.5 rounded-full">INTENTO</div>
                                            `}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-8">
                         <button onclick="startGame(false)" class="bg-emerald-500 text-white p-4 rounded-xl text-sm font-black hover:bg-emerald-600 transition-all active:scale-95 shadow-md">Nuevo Normal</button>
                         <button onclick="startGame(true)" class="bg-slate-900 text-white p-4 rounded-xl text-sm font-black hover:bg-black border-b-4 border-red-500 transition-all active:scale-95 shadow-md">Nuevo Experto</button>
                    </div>
                </div>
            `;
    }

    init();
  </script>
</body>

</html>
